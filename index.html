<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🙉😴💩👺苦菜团建之旅</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 登录门（仅云端模式显示） -->
  <div id="login" class="login-mask">
    <div class="login-card">
      <div class="login-emoji">🧳</div>
      <h1>🙉😴💩👺苦菜团建之旅</h1>
      <p class="login-sub">输入密码进入（仅限我们四人）</p>
      <div id="loginEmail" class="login-email"></div>
      <input id="pw" type="password" placeholder="密码" autocomplete="off" />
      <button id="loginBtn">进入</button>
      <p id="loginErr" class="err"></p>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="app" class="hidden">
    <header class="topbar">
      <span class="logo">🙉😴💩👺苦菜团建之旅</span>
      <button id="logoutBtn" class="ghost">退出</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="plan">行程</button>
      <button class="tab" data-tab="money">费用</button>
      <button class="tab" data-tab="list">待办清单</button>
      <button class="tab" data-tab="tickets">门票预订</button>
    </nav>

    <main>
      <!-- 行程 -->
      <section class="panel active" id="plan">
        <form id="planForm" class="row-form">
          <input name="date" type="date" placeholder="日期" />
          <input name="time" type="time" placeholder="时间" />
          <input name="title" placeholder="安排（如：故宫）" required />
          <input name="place" placeholder="地点" />
          <input name="note" placeholder="备注" />
          <button type="submit">添加</button>
        </form>
        <div id="planList" class="cards"></div>
      </section>

      <!-- 费用 -->
      <section class="panel" id="money">
        <div class="row-form inline">
          <label>平分人数 <input id="splitN" type="number" min="1" value="2" style="width:64px" /></label>
        </div>
        <form id="moneyForm" class="row-form">
          <select name="who" required>
            <option value="胖哥">胖哥</option>
            <option value="华老师">华老师</option>
          </select>
          <input name="amount" type="number" step="0.01" placeholder="金额" required />
          <input name="currency" placeholder="币种" value="¥" style="width:64px" />
          <select name="what" required>
            <option value="伙食费">伙食费</option>
            <option value="饮品零食费">饮品零食费</option>
            <option value="油电路费">油电路费</option>
            <option value="住宿费">住宿费</option>
            <option value="门票及玩乐项目费">门票及玩乐项目费</option>
            <option value="租车">租车</option>
            <option value="其他">其他</option>
          </select>
          <input name="date" type="date" />
          <button type="submit">记一笔</button>
        </form>
        <div id="settle" class="settle"></div>
        <div id="moneyList" class="cards"></div>
      </section>

      <!-- 待办清单 -->
      <section class="panel" id="list">
        <div class="list-bar">
          <span class="list-hint">酒店预订请指定负责人并点「确认」（可重复修改）</span>
          <button id="resetBtn" type="button" class="ghost danger">重置为默认</button>
        </div>
        <form id="listForm" class="row-form">
          <input name="text" placeholder="要带 / 要做的事" required />
          <select name="by">
            <option value="">负责人</option>
            <option value="胖哥">胖哥</option>
            <option value="Leo">Leo</option>
            <option value="华老师">华老师</option>
            <option value="AT">AT</option>
          </select>
          <button type="submit">添加</button>
        </form>
        <div id="listBox" class="checklist"></div>
      </section>

      <!-- 门票预订 -->
      <section class="panel" id="tickets">
        <div class="ticket-bar">
          <span class="ticket-hint">每完成一项点勾，方便追踪购票进度 💡</span>
        </div>
        <div id="ticketList" class="tickets-container"></div>
      </section>
    </main>
    <p id="modeHint" class="mode-hint"></p>
  </div>

  <div id="toast" class="toast"></div>

  <script src="supabase.min.js?v=8"></script>
  <script src="config.js?v=8"></script>
  <script src="seed-data.js?v=8"></script>
  <script src="app.js?v=8"></script>
</body>
</html>
