<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>我们的旅行</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 登录门（仅云端模式显示） -->
  <div id="login" class="login-mask">
    <div class="login-card">
      <div class="login-emoji">🧳</div>
      <h1>我们的旅行</h1>
      <p class="login-sub">输入密码进入（仅限我们四人）</p>
      <div id="loginEmail" class="login-email"></div>
      <input id="pw" type="password" placeholder="密码" autocomplete="off" />
      <button id="loginBtn">进入</button>
      <p id="loginErr" class="err"></p>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="app" class="hidden">
    <header class="topbar">
      <span class="logo">🧳 我们的旅行</span>
      <button id="logoutBtn" class="ghost">退出</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="plan">行程</button>
      <button class="tab" data-tab="money">费用</button>
      <button class="tab" data-tab="list">清单</button>
      <button class="tab" data-tab="notes">注意</button>
    </nav>

    <main>
      <!-- 行程 -->
      <section class="panel active" id="plan">
        <form id="planForm" class="row-form">
          <input name="date" type="date" placeholder="日期" />
          <input name="time" type="time" placeholder="时间" />
          <input name="title" placeholder="安排（如：故宫）" required />
          <input name="place" placeholder="地点" />
          <input name="note" placeholder="备注" />
          <button type="submit">添加</button>
        </form>
        <div id="planList" class="cards"></div>
      </section>

      <!-- 费用 -->
      <section class="panel" id="money">
        <div class="row-form inline">
          <label>平分人数 <input id="splitN" type="number" min="1" value="4" style="width:64px" /></label>
        </div>
        <form id="moneyForm" class="row-form">
          <input name="who" placeholder="付款人" required />
          <input name="amount" type="number" step="0.01" placeholder="金额" required />
          <input name="currency" placeholder="币种" value="¥" style="width:64px" />
          <input name="what" placeholder="用途（如：晚餐）" />
          <input name="date" type="date" />
          <button type="submit">记一笔</button>
        </form>
        <div id="settle" class="settle"></div>
        <div id="moneyList" class="cards"></div>
      </section>

      <!-- 清单 -->
      <section class="panel" id="list">
        <form id="listForm" class="row-form">
          <input name="text" placeholder="要带 / 要做的事" required />
          <input name="by" placeholder="谁" />
          <button type="submit">添加</button>
        </form>
        <div id="listBox" class="checklist"></div>
      </section>

      <!-- 注意事项 -->
      <section class="panel" id="notes">
        <div class="notes-grid">
          <label>天气<input id="nWeather" placeholder="晴 / 雨…" /></label>
          <label>海拔/温度<input id="nTemp" placeholder="海拔变化、温度" /></label>
          <label>穿衣建议<textarea id="nCloth" rows="2" placeholder="短袖+薄外套"></textarea></label>
          <label>药物/装备<textarea id="nMed" rows="2" placeholder="感冒药、氧气瓶…"></textarea></label>
        </div>
        <div class="notes-custom">
          <h3>其他提醒</h3>
          <div id="customList" class="cards"></div>
          <form id="customForm" class="row-form">
            <input name="text" placeholder="补充一条提醒" required />
            <button type="submit">加一条</button>
          </form>
        </div>
      </section>
    </main>
    <p id="modeHint" class="mode-hint"></p>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="seed-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
